# Все пути /notify/* → HTTP сервер в процессе бота (ORDER_NOTIFY_HTTP_PORT, по умолчанию 8788):
#   POST /notify/payment/prepare  — ссылка на pay.fk.money
#   GET|POST /notify/freekassa     — callback FreeKassa (URL в ЛК)
#   POST /notify/virt-order-webapp, /notify/sell-virt-webapp, /notify/referral, …
#
# КРИТИЧНО: этот location {} должен быть в server { } ВЫШЕ, чем
#   location / { try_files ... /index.html; }
# иначе браузер получит index.html (text/html) вместо JSON — в мини-аппе ошибка
# «возможно, нет прокси на /notify/».
#
# Проверка:
#   curl -sS -X POST -H 'Content-Type: application/json' -d '{"initData":"x"}' -D- \
#     https://ВАШ_ДОМЕН/notify/payment/prepare
# Ожидается JSON с полем "error" или 401/400, НЕ text/html.
#
# proxy_pass без URI в конце — путь /notify/... уходит на бэкенд целиком (как слушает Node).

location /notify/ {
    proxy_pass http://127.0.0.1:8788;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
}
