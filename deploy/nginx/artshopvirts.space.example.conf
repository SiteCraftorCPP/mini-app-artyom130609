# Пример vhost для artshopvirts.space (HTTPS + мини-апп + прокси всех /notify/* на бота).
#
# На сервере (подставь свой путь к репо и способ перезапуска бота):
#   cd /var/www/artshopvirts/bot && git pull && npm ci && npm run build && pm2 restart all
#   sudo cp deploy/nginx/artshopvirts.space.example.conf /etc/nginx/sites-available/artshopvirts.space
#   # или вручную: вставь в существующий файл блок server { } ниже и проверь пути root/ssl
#   sudo nginx -t && sudo systemctl reload nginx
#   curl -sS -D- -o /dev/null https://artshopvirts.space/notify/streampay
# Ожидается не 404 (ответ бота: 400/503/…).
#
# Не дублируй отдельные location на /notify/… кроме этого префикса — иначе payment/prepare,
# freekassa и streampay не дойдут до Node.

server {
    server_name artshopvirts.space www.artshopvirts.space;

    root /var/www/artshopvirts/html;
    index index.html;

    # ВАЖНО: выше location /
    location /notify/ {
        proxy_pass http://127.0.0.1:8788;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = /api/promo-codes {
        proxy_pass http://127.0.0.1:8788;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/artshopvirts.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/artshopvirts.space/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    listen [::]:80;
    server_name artshopvirts.space www.artshopvirts.space;
    return 301 https://artshopvirts.space$request_uri;
}
