# Мини-апп запрашивает GET {origin}/api/promo-codes (тот же origin, что и сайт).
# Бот слушает ORDER_NOTIFY (по умолчанию 127.0.0.1:8788) и обрабатывает /api/promo-codes.
# Вставьте этот location в server { } для https://artshopvirts.space (и при необходимости http→https).

location = /api/promo-codes {
    proxy_pass http://127.0.0.1:8788;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
