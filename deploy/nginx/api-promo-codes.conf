# Мини-апп: GET {origin}/api/promo-codes → бот на 127.0.0.1:8788
#
# ВАЖНО: этот location должен быть в server { } ВЫШЕ, чем блок
#   location / { try_files ... /index.html; }
# иначе /api/promo-codes попадёт в SPA и отдаст index.html (Content-Type: text/html, ~1.2 KB).
#
# Проверка после reload:
#   curl -sS -D- -o /dev/null https://artshopvirts.space/api/promo-codes
# Ожидается: Content-Type: application/json, не text/html

location = /api/promo-codes {
    proxy_pass http://127.0.0.1:8788;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
